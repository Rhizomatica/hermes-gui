<label [style.pointer-events]="enabled ? 'auto' : 'none'" [style.opacity]="enabled ? '1' : '0.5'" style="display:flex; align-items:center; gap:8px;">
  <span i18n="@@{{keyA}}">{{keyA}}</span>
  <div class="switch">
    <input type="checkbox" name="{{inputName}}" [ngModel]="value" (change)="onSwitch()" [attr.disabled]="enabled ? null : 'disabled'">
    <span class="slider round one-color"></span>
  </div>
  <span i18n="@@{{keyB}}">{{keyB}}</span>

</label>
